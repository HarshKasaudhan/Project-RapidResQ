<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Center | RapidResQ Enterprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <!-- Heatmap Plugin -->
    <script src="https://cdn.jsdelivr.net/npm/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-black: #080808;
            --primary-cyan: #02DEE5;
            --secondary-blue: #1F76F3;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-black); color: #e5e5e5; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .panel { background: #0f0f0f; border: 1px solid rgba(2, 222, 229, 0.1); border-radius: 12px; }
        .btn-primary { background: linear-gradient(135deg, var(--primary-cyan) 0%, var(--secondary-blue) 100%); color: black; font-weight: 700; }
        .map-layer { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(85%); }
    </style>
</head>
<body class="min-h-screen flex flex-col antialiased">

    <!-- Header -->
    <header class="bg-[#0f0f0f] border-b border-white/5 sticky top-0 z-50">
        <div class="px-6 py-4 flex items-center justify-between">
            <a href="{% url 'home' %}" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
                <svg class="w-6 h-6 text-[#02DEE5]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                <h1 class="text-[10px] font-bold tracking-[0.2em] text-white uppercase">
                    {{ venue.hotel_name }} <span class="text-[#02DEE5]/50 font-normal">/ Command</span>
                </h1>
            </a>
            <div class="flex items-center gap-6 text-[10px] font-mono">
                <span class="text-gray-500 uppercase tracking-widest">Status: <span class="text-[#02DEE5]" id="status-indicator">Secure</span></span>
                <span class="text-gray-500" id="clock">00:00:00 UTC</span>
                <a href="{% url 'home' %}" class="text-gray-500 hover:text-white transition-colors border-l border-white/10 pl-6 ml-2">EXIT</a>
            </div>
        </div>
    </header>

    <main class="flex-grow p-6 grid grid-cols-1 xl:grid-cols-3 gap-6 h-[calc(100vh-65px)]">
        <section class="xl:col-span-2 flex flex-col gap-6">
            <div class="panel p-1 h-[60%] relative overflow-hidden">
                <div id="map" class="w-full h-full rounded-lg bg-[#111]"></div>
                
                <!-- Floating Emergency Chat Panel (Command Side) -->
                <div id="dashboard-chat-panel" class="absolute bottom-4 right-4 z-[1000] w-72 h-80 bg-[#080808]/95 backdrop-blur-xl border border-[#02DEE5]/20 rounded-2xl shadow-2xl flex flex-col hidden">
                    <div class="p-3 border-b border-white/5 flex justify-between items-center bg-black/40">
                        <div>
                            <h4 id="chat-target-name" class="text-[9px] font-black text-[#02DEE5] uppercase tracking-widest">Live SOS Chat</h4>
                            <p id="chat-incident-info" class="text-[7px] text-gray-500 font-bold uppercase tracking-widest">Incident Active</p>
                        </div>
                        <button onclick="toggleDashboardChat()" class="text-gray-500 hover:text-white"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                    </div>
                    <div id="dashboard-chat-messages" class="flex-grow p-4 overflow-y-auto space-y-3 text-[10px] font-mono scrollbar-hide">
                        <!-- Messages -->
                    </div>
                    <div class="p-3 border-t border-white/5 bg-black/40 flex gap-2">
                        <input type="text" id="dashboard-chat-input" class="flex-grow bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-[10px] text-white focus:outline-none focus:border-[#02DEE5]" placeholder="Command Response...">
                        <button onclick="sendDashboardMessage()" class="p-2 bg-[#02DEE5] rounded-lg text-black transition-transform active:scale-95"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg></button>
                    </div>
                </div>
            </div>
            <div class="panel p-5 flex-grow flex flex-col overflow-hidden">
                <div class="flex items-center justify-between mb-4 border-b border-white/5 pb-4">
                    <h2 class="text-[10px] font-bold text-[#02DEE5] uppercase tracking-[0.2em]">Active Incidents</h2>
                    <span class="bg-[#02DEE5]/10 text-[#02DEE5] text-[10px] px-2 py-1 rounded font-mono border border-[#02DEE5]/20" id="emergency-count">0 DETECTED</span>
                </div>
                <div id="emergencies-container" class="flex-grow overflow-y-auto space-y-3 pr-2 scrollbar-hide"></div>
            </div>
        </section>

        <section class="flex flex-col gap-6 h-full">
            <div class="panel p-6">
                <h2 class="text-[10px] font-bold text-[#02DEE5] uppercase tracking-[0.2em] mb-6">Dispatch Intelligence</h2>
                <button id="ai-voice-btn" class="w-full btn-primary py-3 rounded-lg text-[11px] mb-6 uppercase tracking-widest flex items-center justify-center gap-3">🎙️ Voice Command</button>
                <div class="bg-black/50 border border-white/5 rounded-lg p-4 h-24 overflow-y-auto font-mono text-[10px] text-gray-500 mb-6" id="ai-transcript">System Ready.</div>
                <h3 class="text-[10px] font-bold text-[#1F76F3] uppercase tracking-widest mb-4">Nearest Responders</h3>
                <div id="nearest-staff-container" class="space-y-2"></div>
            </div>
            <div class="panel flex-grow flex flex-col overflow-hidden">
                <div class="p-4 border-b border-white/5"><h2 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Audit Log</h2></div>
                <div id="audit-log" class="p-4 overflow-y-auto h-full space-y-3 bg-black/20 font-mono text-[10px]"></div>
            </div>
        </section>
    </main>

    {{ staff_json|json_script:"staff-data" }}
    {{ venue.id|json_script:"venue-id" }}

    <script>
        let map;
        let staffMarkers = {}; 
        let currentChatSocket = null;
        let currentIncidentId = null;

        // --- FEATURE 2: Heatmap & Density Analytics ---
        let crowdHeatLayer;
        let activeIncidentMarkers = []; // Track active guest SOS markers for heat data

        function initHeatmap(mapInstance) {
            crowdHeatLayer = L.heatLayer([], {
                radius: 35,
                blur: 15,
                maxZoom: 17,
                gradient: { 0.4: 'blue', 0.6: 'lime', 0.8: 'yellow', 1: 'red' }
            }).addTo(mapInstance);
        }

        function updateCrowdHeatmap() {
            const points = [];
            
            // 1. Collect staff positions
            Object.values(staffMarkers).forEach(m => {
                const ll = m.getLatLng();
                points.push([ll.lat, ll.lng, 0.5]); // Intensity 0.5
            });
            
            // 2. Collect incident/guest positions (higher risk)
            activeIncidentMarkers.forEach(m => {
                const ll = m.getLatLng();
                points.push([ll.lat, ll.lng, 0.9]); // Intensity 0.9
            });

            if (crowdHeatLayer) {
                crowdHeatLayer.setLatLngs(points);
            }
            
            // Run Proximity Risk Analysis
            checkCrowdDensity(points);
        }

        function checkCrowdDensity(points) {
            const THRESHOLD_COUNT = 5; // Cluster size
            const RISK_RADIUS = 0.0004; // ~40m proximity threshold
            
            for (let i = 0; i < points.length; i++) {
                let cluster = 0;
                for (let j = 0; j < points.length; j++) {
                    const dist = Math.hypot(points[i][0] - points[j][0], points[i][1] - points[j][1]);
                    if (dist < RISK_RADIUS) cluster++;
                }
                
                if (cluster >= THRESHOLD_COUNT) {
                    showDensityWarning();
                    break;
                }
            }
        }

        function showDensityWarning() {
            if (document.getElementById('density-alert-banner')) return;
            const banner = document.createElement('div');
            banner.id = 'density-alert-banner';
            banner.className = "fixed top-24 left-1/2 -translate-x-1/2 z-[3000] bg-red-600 text-white px-6 py-3 rounded-full font-black text-[10px] uppercase tracking-widest shadow-2xl animate-bounce border-2 border-white";
            banner.innerHTML = "⚠️ CRITICAL: High Crowd Density Detected. Potential Stampede Risk. Reroute required.";
            document.body.appendChild(banner);
            setTimeout(() => banner.remove(), 8000);
        }

        const venueId = JSON.parse(document.getElementById('venue-id').textContent);
        const staffList = JSON.parse(document.getElementById('staff-data').textContent);

        // --- Dashboard Chat Logic ---
        function toggleDashboardChat() {
            const panel = document.getElementById('dashboard-chat-panel');
            panel.classList.toggle('hidden');
        }

        function joinChat(incidentId, type) {
            console.log("[COMMAND] Joining chat for incident:", incidentId);
            if (currentChatSocket) {
                console.log("[COMMAND] Closing existing chat socket...");
                currentChatSocket.close();
            }
            
            currentIncidentId = incidentId;
            document.getElementById('chat-incident-info').textContent = `Incident #${incidentId} (${type})`;
            document.getElementById('dashboard-chat-messages').innerHTML = ''; // Clear old messages
            document.getElementById('dashboard-chat-panel').classList.remove('hidden');

            const protocol = location.protocol === 'https:' ? 'wss://' : 'ws://';
            const url = `${protocol}${location.host}/ws/chat/${incidentId}/`;
            console.log("[COMMAND] Connecting to:", url);
            
            currentChatSocket = new WebSocket(url);
            
            currentChatSocket.onopen = () => console.log("[COMMAND] Chat WebSocket Connected");
            currentChatSocket.onerror = (err) => console.error("[COMMAND] Chat WebSocket Error:", err);
            
            currentChatSocket.onmessage = (e) => {
                const data = JSON.parse(e.data);
                console.log("[COMMAND] Message received:", data);
                appendDashboardMessage(data.message, data.sender_id === 'user' ? 'user' : 'command');
            };
        }

        function appendDashboardMessage(text, sender) {
            const container = document.getElementById('dashboard-chat-messages');
            const div = document.createElement('div');
            const isUser = sender === 'user';
            div.className = isUser 
                ? "bg-white/5 p-2 rounded-lg border border-white/5 max-w-[90%] text-gray-400"
                : "bg-[#02DEE5] text-black p-2 rounded-lg max-w-[90%] ml-auto font-bold";
            div.innerHTML = `<p>${text}</p>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function sendDashboardMessage() {
            const input = document.getElementById('dashboard-chat-input');
            const text = input.value.trim();
            console.log("[COMMAND] Attempting to send message:", text);
            
            if (text && currentChatSocket && currentChatSocket.readyState === WebSocket.OPEN) {
                currentChatSocket.send(JSON.stringify({ 'message': text, 'sender_id': 'command' }));
                console.log("[COMMAND] Message sent successfully");
                input.value = '';
                input.focus();
            } else {
                console.error("[COMMAND] Cannot send. Socket status:", currentChatSocket ? currentChatSocket.readyState : "null");
            }
        }

        document.getElementById('dashboard-chat-input').onkeypress = (e) => { if(e.key === 'Enter') sendDashboardMessage(); };

        // Fix: Dispatch Intelligence (Voice Command) logic
        document.addEventListener('DOMContentLoaded', () => {
            const aiVoiceBtn = document.getElementById('ai-voice-btn');
            const aiTranscript = document.getElementById('ai-transcript');
            
            if (aiVoiceBtn) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    const recognition = new SpeechRecognition();
                    recognition.lang = 'en-US';
                    recognition.interimResults = true;

                    aiVoiceBtn.onclick = () => {
                        console.log("[DISPATCH] Voice recognition started...");
                        recognition.start();
                        aiVoiceBtn.classList.add('animate-pulse', 'border-red-500');
                        aiTranscript.textContent = "Listening for dispatch command...";
                    };

                    recognition.onresult = (event) => {
                        const transcript = event.results[0][0].transcript;
                        console.log("[DISPATCH] Voice text:", transcript);
                        aiTranscript.textContent = transcript;
                        
                        if (event.results[0].isFinal) {
                            console.log("[DISPATCH] Final command recognized:", transcript);
                            aiVoiceBtn.classList.remove('animate-pulse', 'border-red-500');
                            // Trigger AI analysis if needed
                        }
                    };

                    recognition.onerror = (err) => {
                        console.error("[DISPATCH] recognition error:", err.error);
                        aiVoiceBtn.classList.remove('animate-pulse', 'border-red-500');
                        aiTranscript.textContent = "Error: " + err.error;
                    };
                    
                    recognition.onend = () => {
                        aiVoiceBtn.classList.remove('animate-pulse', 'border-red-500');
                    };
                } else {
                    aiVoiceBtn.textContent = "Voice Not Supported";
                    aiVoiceBtn.disabled = true;
                }
            }
        });

        // --- End Chat Logic ---
        
        const createStaffIcon = (name) => L.divIcon({
            className: 'custom-div-icon',
            html: `<div class='flex flex-col items-center'><div class='w-3 h-3 rounded-full bg-[#02DEE5] border-2 border-white shadow-lg'></div><span class='text-[8px] font-bold text-white bg-black/50 px-1 rounded mt-1 whitespace-nowrap'>${name}</span></div>`,
            iconSize: [12, 12], iconAnchor: [6, 6]
        });

        function haversine(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const p1 = lat1 * Math.PI/180;
            const p2 = lat2 * Math.PI/180;
            const dp = (lat2-lat1) * Math.PI/180;
            const dl = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        document.addEventListener('DOMContentLoaded', () => {
            map = L.map('map', {zoomControl: false, attributionControl: false}).setView([30.7699, 76.5756], 15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { className: 'map-layer', maxZoom: 20 }).addTo(map);
            
            // Initialize Heatmap Layer
            initHeatmap(map);

            const socketUrl = `${(window.location.protocol === 'https:') ? 'wss://' : 'ws://'}${window.location.host}/ws/alerts/?venue_id=${venueId}&role=ADMIN`;
            const socket = new WebSocket(socketUrl);
            
            socket.onmessage = e => {
                const data = JSON.parse(e.data);
                
                // Handle Live Staff Movement
                if (data.staff_update) {
                    const s = data.staff_update;
                    if (staffMarkers[s.id]) {
                        staffMarkers[s.id].setLatLng([s.lat, s.lng]);
                    } else {
                        staffMarkers[s.id] = L.marker([s.lat, s.lng], {icon: createStaffIcon(s.name)}).addTo(map);
                    }
                    updateCrowdHeatmap(); // Re-render heat layer on staff move
                    return;
                }

                // Handle Incident Resolution from Staff Handshake
                if (data.type === 'incident_resolved') {
                    const countElem = document.getElementById('emergency-count');
                    const currentCount = parseInt(countElem.textContent) || 0;
                    if (currentCount > 0) {
                        countElem.textContent = `${currentCount - 1} DETECTED`;
                    }
                    
                    // Show resolution toast
                    const toast = document.createElement('div');
                    toast.className = "fixed bottom-10 left-1/2 -translate-x-1/2 bg-green-500 text-black px-6 py-3 rounded-full font-black text-[10px] uppercase tracking-widest z-[2000] shadow-2xl";
                    toast.textContent = `Incident #${data.incident_id} Resolved via Proximity`;
                    document.body.appendChild(toast);
                    setTimeout(() => toast.remove(), 4000);
                    return;
                }

                // Handle SOS Alerts (Detailed from GlobalAlertConsumer)
                if (data.type === 'emergency_confirmed' || data.alert) {
                    const isConfirmed = data.type === 'emergency_confirmed';
                    const category = isConfirmed ? data.category : data.alert.type;
                    const locationStr = isConfirmed ? `Lat: ${data.lat}, Lng: ${data.lng}` : data.alert.location;
                    const incidentId = isConfirmed ? data.incident_id : null;
                    const severity = isConfirmed ? data.severity : "CRITICAL";
                    
                    // Fallback to default if coordinates are 0 or missing
                    let lat = isConfirmed ? (data.lat || 30.7699) : 30.7699;
                    let lng = isConfirmed ? (data.lng || 76.5756) : 76.5756;
                    
                    if (lat === 0 && lng === 0) {
                        lat = 30.7699; lng = 76.5756;
                    }

                    // Update Map
                    const marker = L.marker([lat, lng], {icon: L.divIcon({className: 'bg-red-600 w-4 h-4 rounded-full border-2 border-white animate-ping'})}).addTo(map);
                    activeIncidentMarkers.push(marker); // Add to heatmap tracking
                    updateCrowdHeatmap(); // Re-render heat layer
                    map.setView([lat, lng], 16);
                    
                    // Update Incident List UI
                    const container = document.getElementById('emergencies-container');
                    const div = document.createElement('div');
                    div.className = "bg-red-500/10 border border-red-500/20 p-4 rounded-xl flex justify-between items-center animate-pulse";
                    div.innerHTML = `
                        <div>
                            <p class="text-[8px] font-black text-red-500 uppercase mb-1">${severity} | ${category}</p>
                            <p class="text-[10px] font-bold text-white">${locationStr}</p>
                        </div>
                        <div class="flex gap-2">
                            ${incidentId ? `<button onclick="joinChat(${incidentId}, '${category}')" class="bg-red-500 text-white text-[8px] px-3 py-1.5 rounded-lg font-black uppercase tracking-widest">Join Chat</button>` : ''}
                            <button class="bg-white/10 text-white text-[8px] px-3 py-1.5 rounded-lg font-black uppercase tracking-widest">Dispatch</button>
                        </div>
                    `;
                    container.prepend(div);
                    
                    const countElem = document.getElementById('emergency-count');
                    const currentCount = parseInt(countElem.textContent) || 0;
                    countElem.textContent = `${currentCount + 1} DETECTED`;
                }
            };
        });
    </script>
</body>
</html>
